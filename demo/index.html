<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CSV Dataset Explorer</title>
  <script>
    (() => {
      const storageKey = "csv-explorer-theme";
      let theme = "light";

      try {
        const stored = window.localStorage.getItem(storageKey);
        if (stored === "light" || stored === "dark") {
          theme = stored;
        } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
          theme = "dark";
        }
      } catch {
        if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
          theme = "dark";
        }
      }

      document.documentElement.dataset.theme = theme;
      document.documentElement.style.colorScheme = theme;
    })();
  </script>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div id="app"></div>
  <script type="module">
    import { mountDatasetExplorer } from "../src/index.js";
    mountDatasetExplorer({
      root: "#app",
      defaultCsvUrl: "https://data.healthcare.gov/sites/default/files/uploaded_resources/AB_Termination_List_823.csv"
    });
  </script>
</body>
</html>
